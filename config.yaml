server:
  host: "0.0.0.0"
  port: 9090
  audio:
    sample_rate: 16000
    channels: 1
    sample_width: 2
    chunk_duration_s: 0.5
    buffer_threshold_s: 10.0
    vad_energy_threshold: 500.0
    vad_silence_duration_s: 1.5
  transcription:
    model_size: "large-v3"
    device: "cuda"
    compute_type: "float16"
    beam_size: 5
    language: "en"
  logging:
    level: "INFO"
    transcript_dir: "transcripts"

client:
  server_url: "ws://localhost:9090/audio"
  sample_rate: 16000
  channels: 1
  chunk_duration_s: 0.5
  reconnect_delay_s: 2.0
  max_reconnect_attempts: 0
  logging:
    level: "INFO"
